services:
  postgres:
    image: postgres:16-alpine
    container_name: talim-postgres
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: talim
      POSTGRES_PASSWORD: "0223"
      POSTGRES_DB: talim
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data:
